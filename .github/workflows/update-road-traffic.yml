name: Uppdatera vägtrafik

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/update_road_traffic.py"
      - ".github/workflows/update-road-traffic.yml"
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: dinpuls-road-traffic
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Hämta vägtrafik från Trafikverket
        env:
          TRAFIKVERKET_API_KEY: ${{ secrets.TRAFIKVERKET_API_KEY }}
        run: python scripts/update_road_traffic.py
      - name: Spara vägtrafik
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/road-traffic.json
          if ! git diff --cached --quiet; then
            git commit -m "Uppdatera vägtrafik"
            git pull --rebase
            git push
          fi

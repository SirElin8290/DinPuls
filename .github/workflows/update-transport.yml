name: Uppdatera kollektivtrafik

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: dinpuls-transport-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Aktivera Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Hämta aktuella avgångar
        env:
          TRAFIKLAB_API_KEY: ${{ secrets.TRAFIKLAB_API_KEY }}
        run: python scripts/update_transport.py

      - name: Spara ny trafikdata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/transport.json
          git diff --cached --quiet || git commit -m "Uppdatera buss- och tågtider"
          git push

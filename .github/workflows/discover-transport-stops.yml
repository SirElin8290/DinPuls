name: Hitta hållplatser och aktivera trafikdata

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dinpuls-transport-data
  cancel-in-progress: false

jobs:
  discover-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sök säkra hållplatsgrupper
        env:
          TRAFIKLAB_API_KEY: ${{ secrets.TRAFIKLAB_API_KEY }}
        run: python scripts/discover_transport_stops.py
      - name: Hämta första riktiga avgångarna
        env:
          TRAFIKLAB_API_KEY: ${{ secrets.TRAFIKLAB_API_KEY }}
        run: python scripts/update_transport.py
      - name: Spara hållplatser och trafikdata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/municipalities.json data/stop-candidates.json data/transport.json
          git diff --cached --quiet || git commit -m "Aktivera riktiga hållplatser och avgångar"
          git push
name: Uppdatera DinPuls nyhetsflöden
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
permissions:
  contents: write
concurrency:
  group: dinpuls-news-update
  cancel-in-progress: true
jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Hämta öppna RSS-flöden
        run: python scripts/update_news.py
      - name: Spara uppdatering
        run: |
          git config user.name "DinPuls News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "Uppdatera nyhetsflöden"
          git push
name: Uppdatera kollektivtrafik
on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
permissions:
  contents: write

concurrency:
  group: dinpuls-transport-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Hämta avgångar
        env:
          TRAFIKLAB_API_KEY: ${{ secrets.TRAFIKLAB_API_KEY }}
        run: python scripts/update_transport.py
      - name: Spara förändringar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/transport.json
          git diff --cached --quiet || git commit -m "Uppdatera buss- och tågtider"
          git push

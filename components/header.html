<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="#" aria-label="DinPuls startsida">
      <img class="brand-logo" src="assets/logo.svg" alt="DinPuls.se">
    </a>

    <form class="search" role="search">
      <i data-lucide="search" aria-hidden="true"></i>
      <input aria-label="Sök" placeholder="Sök info, företag, nyheter, evenemang...">
      <button type="submit">Sök</button>
    </form>

    <div class="header-actions">
      <button class="municipality-button" id="municipality-button" type="button">
        <i data-lucide="map-pin"></i><span id="selected-municipality">Åmål</span>
      </button>
      <span class="weather-compact"><i data-lucide="cloud-sun"></i>22°C</span>
      <span class="live-clock" id="live-clock">--:--</span>
      <button class="icon-button" id="theme-toggle" type="button" aria-label="Växla mörkt läge">
        <i data-lucide="moon"></i>
      </button>
      <button class="icon-button notification-button" type="button" aria-label="Notiser">
        <i data-lucide="bell"></i><b>2</b>
      </button>
      <button class="icon-button mobile-menu-button" id="mobile-menu-button" type="button" aria-label="Öppna meny">
        <i data-lucide="menu"></i>
      </button>
    </div>
  </div>
</header>

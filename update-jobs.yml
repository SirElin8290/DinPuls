name: Uppdatera lediga jobb

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

concurrency:
  group: dinpuls-jobs-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Hämta projektet
        uses: actions/checkout@v4

      - name: Aktivera Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Hämta aktuella jobbannonser
        run: python scripts/update_jobs.py

      - name: Spara ny jobbdata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if ! git diff --cached --quiet; then
            git commit -m "Uppdatera lediga jobb"
            git pull --rebase
            git push
          fi
